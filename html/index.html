<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Cloud</title>
</head>
<body>
  <h1>MMini Cloud Frontend</h1>
  <p id="status">Loading message from back end...</p>

<script>
  fetch('/api/message')
  .then(response => response.json())
  .then(data => {
    document.getElementById('status').textContent =
    '${data.message} - commit ${data.commit}';
  })
  .catch(error => {
    document.getElementById('status').textContent =
    'Failed to load backend message';
    console.error(error);
  });
</script>

</body>
</html>
