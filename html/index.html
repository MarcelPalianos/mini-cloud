<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Cloud</title>
</head>
<body>
  <h1>Mini Cloud Frontend</h1>
  <p id="status">Loading message from back end...</p>

<script>
  fetch('/api/message')
  .then(response => response.json())
  .then(data => {
    document.getElementById('status').innerText =
    $data.message + "commit" + $data.commit;
  })
  .catch(err => {
    document.getElementById('status').innerText =
    "Failed to load backend message";
  });
</script>

</body>
</html>
