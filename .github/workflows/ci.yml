name: Mini Cloud CI

on:
  push:
    branches:
      - main

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check Python syntax
        run: python -m py_compile app/app.py

      - name: Set image tag
        run: echo "SHA_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mini-cloud-backend:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/mini-cloud-backend:${{ env.SHA_TAG }} \
            ./app

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mini-cloud-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/mini-cloud-backend:${{ env.SHA_TAG }}