

services:

  web:
    image: nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend

  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: example
      POSTGRES_DB: mydb
    volumes:
      - postgres_data:/var/lib/postgresql/

  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"

  redis:
   image: redis
  backend:
    build: ./app
    restart: always
    environment:
      DB_HOST: db
      DB_NAME: mydb
      DB_USER: myuser
      DB_PASSWORD: example
    depends_on:
      - db
volumes:
  postgres_data:
